<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Voss Taxi - moderne bestilling, takstar, tenester og kontakt for taxi på Voss."
    />
    <meta name="theme-color" content="#0b0b09" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Voss Taxi</title>
    <script>
      window.addEventListener('error', function (event) {
        document.documentElement.dataset.bootError = 'true'
        var box = document.getElementById('boot-error')
        if (box) box.textContent = 'JavaScript-feil: ' + (event.message || 'ukjent feil')
      })
      window.addEventListener('unhandledrejection', function (event) {
        document.documentElement.dataset.bootError = 'true'
        var box = document.getElementById('boot-error')
        if (box) box.textContent = 'JavaScript-feil: ' + ((event.reason && event.reason.message) || event.reason || 'ukjent feil')
      })
    </script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="b2606af9-4c2a-48f5-ba9d-9aa552c9ab0d"></script>
  </head>
  <body>
    <div id="boot-error" style="display:none;position:fixed;left:12px;right:12px;top:12px;z-index:99999;border:1px solid #d8ae3d;background:#17130b;color:#fff8e8;border-radius:12px;padding:12px 14px;font-family:Arial,sans-serif;font-size:14px"></div>
    <div id="root">
      <main style="min-height:100vh;background:#0b0b09;color:#fff8e8;font-family:Arial,sans-serif;display:grid;place-items:center;padding:24px">
        <section style="max-width:720px">
          <p style="color:#d8ae3d;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase">Voss Taxi</p>
          <h1 style="font-size:clamp(42px,9vw,82px);line-height:.95;margin:18px 0 16px">Taxi på Voss</h1>
          <p style="color:#d8d0bd;font-size:18px;line-height:1.6">Laster nettsiden. Hvis denne teksten blir stående, last siden på nytt eller kontakt utvikler.</p>
          <p style="margin-top:28px"><a href="tel:+4756511340" style="display:inline-block;background:#d8ae3d;color:#181511;border-radius:12px;padding:14px 18px;font-weight:800;text-decoration:none">Ring 56 51 13 40</a></p>
        </section>
      </main>
    </div>
    <script>
      setTimeout(function () {
        var root = document.getElementById('root')
        var errorBox = document.getElementById('boot-error')
        if (document.documentElement.dataset.bootError === 'true' && errorBox) {
          errorBox.style.display = 'block'
        }
        if (root && !root.textContent.trim() && errorBox) {
          errorBox.style.display = 'block'
          errorBox.textContent = 'Nettsiden startet ikke. HTML er lastet, men React rendret ikke innhold.'
        }
      }, 2500)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
