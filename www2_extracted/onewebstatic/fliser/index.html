<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1980, initial-scale=1.0, user-scalable=no" />
<title>Voss Taxi - Digital Flishaug v1.2</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚕</text></svg>">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="container">
  <button class="sleep-btn" id="sleepBtn">Sove</button>
  <button class="reset-btn" id="resetBtn">R
    <svg class="reset-ring" viewBox="0 0 36 36">
      <path id="resetPath" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"
        stroke-dasharray="100" stroke-dashoffset="100"
        d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" />
    </svg>
  </button>
  <div class="column" id="inne">
    <div class="header header-inne" id="inneHeader">INNE</div>
    <div class="inne-list" id="inneList"></div>
  </div>
  <div class="column" id="ute">
    <div class="header header-ute" id="uteHeader">UTE</div>
    <div class="ute-columns">
      <div class="ute-col" id="uteCol1"></div>
      <div class="ute-col" id="uteCol2"></div>
    </div>
  </div>
</div>

<div id="sleepOverlay"></div>

<script src="app.js" defer></script>
</body>
</html>
