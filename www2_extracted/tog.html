<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Voss Togtider – Neste 5</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
  }
  table {
    margin: 0 auto;
    border-collapse: collapse;
    width: 50%;
    font-size: 2em;
  }
  th, td {
    padding: 15px;
    border-bottom: 1px solid #444;
  }
  th {
    background: #222;
  }
  .delayed {
    color: red;
  }
</style>
</head>
<body>

<h1>Neste 5 tog – Voss</h1>
<table>
  <thead>
    <tr><th>Type</th><th>Tid</th></tr>
  </thead>
  <tbody id="trains"></tbody>
</table>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const stopId = "NSR:StopPlace:59958"; // Voss
  const endpoint = "https://api.entur.io/journey-planner/v3/graphql";

  function fmt(t) {
    const d = new Date(t);
    return d.toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
  }

  function delayMinutes(aimed, expected) {
    const diff = (new Date(expected) - new Date(aimed)) / 60000;
    return diff > 0 ? ` (+${Math.round(diff)} min)` : "";
  }

  async function fetchCalls() {
    const query = `
      query {
        stopPlace(id: "${stopId}") {
          estimatedCalls(timeRange: 86400, numberOfDepartures: 100) {
            aimedArrivalTime
            expectedArrivalTime
            aimedDepartureTime
            expectedDepartureTime
            serviceJourney {
              journeyPattern {
                line { publicCode }
              }
            }
          }
        }
      }`;
    const resp = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "ET-Client-Name": "voss-tider"
      },
      body: JSON.stringify({ query })
    });
    const json = await resp.json();
    return json.data?.stopPlace?.estimatedCalls || [];
  }

  async function update() {
    const calls = await fetchCalls();

    const trains = calls
      .filter(c => /^R|^F|^VY/.test(c.serviceJourney.journeyPattern.line.publicCode))
      .map(c => {
        const isDeparture = !!c.expectedDepartureTime;
        const aimed = isDeparture ? c.aimedDepartureTime : c.aimedArrivalTime;
        const expected = isDeparture ? c.expectedDepartureTime : c.expectedArrivalTime;
        return {
          type: isDeparture ? "Avg" : "Ank",
          aimed,
          expected
        };
      })
      .sort((a, b) => new Date(a.expected) - new Date(b.expected))
      .slice(0, 5);

    document.getElementById("trains").innerHTML = trains.map(t => {
      const delay = delayMinutes(t.aimed, t.expected);
      const delayedClass = delay ? "delayed" : "";
      return `<tr>
                <td>${t.type}</td>
                <td class="${delayedClass}">${fmt(t.expected)}${delay}</td>
              </tr>`;
    }).join("");
  }

  update();
  setInterval(update, 60000);
});
</script>

</body>
</html>
