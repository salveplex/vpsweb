<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1980, initial-scale=1.0, user-scalable=no">
  <title>Kiosk Drag & Drop – Stable 1.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <!-- Reset button -->
  <button class="reset-btn" id="resetBtn">
    R
    <svg class="reset-ring" viewBox="0 0 36 36">
      <path id="resetPath"
        stroke="#fff"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"
        stroke-dasharray="100"
        stroke-dashoffset="100"
        d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32"
      />
    </svg>
  </button>

  <!-- Columns -->
  <div class="column" id="inne">
    <div class="header">INNE</div>
    <div class="inne-list" id="inneList"></div>
  </div>
  <div class="column" id="ute">
    <div class="header">UTE</div>
    <div class="ute-columns">
      <div class="ute-col" id="uteCol1"></div>
      <div class="ute-col" id="uteCol2"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
