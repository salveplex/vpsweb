name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build --emptyOutDir

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete --exclude=node_modules
          path: dist/
          remote_path: ~/sites/vpsweb_test/
          remote_host: 85.190.102.196
          remote_user: vosstaxi
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 85.190.102.196
          username: vosstaxi
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/sites/vpsweb_test
            pm2 delete vpsweb_test 2>/dev/null || true
            pm2 serve . 3050 --name 'vpsweb_test' --spa
