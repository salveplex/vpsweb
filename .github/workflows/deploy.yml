name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build --emptyOutDir

      - name: Deploy via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 85.190.102.196 >> ~/.ssh/known_hosts
          rsync -avz --delete dist/ vosstaxi@85.190.102.196:~/sites/vpsweb_test/

      - name: Restart PM2
        run: |
          ssh vosstaxi@85.190.102.196 "cd ~/sites/vpsweb_test && pm2 delete vpsweb_test 2>/dev/null || true && pm2 serve . 3050 --name 'vpsweb_test' --spa"
