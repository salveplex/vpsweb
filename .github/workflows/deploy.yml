name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build --emptyOutDir

      - name: Deploy via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: 85.190.102.196
          REMOTE_USER: vosstaxi
          SOURCE: dist/
          TARGET: ~/sites/vpsweb_test/
          ARGS: -avz --delete

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 85.190.102.196
          username: vosstaxi
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/sites/vpsweb_test
            pm2 delete vpsweb_test 2>/dev/null || true
            pm2 serve . 3050 --name 'vpsweb_test' --spa
