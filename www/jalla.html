<!-- Voss Taxi - v1.8.0 -->
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1980, initial-scale=1.0, user-scalable=no" />
<title>Voss Taxi - v1.8.0</title>
<style>
/* Bruk CSS fra v1.7.6 (ikke endret) */
</style>
</head>
<body>
<div class="header-container">
  <div class="header-left" id="headerInne">Inne</div>
  <div class="header-divider" id="divider"></div>
  <div class="header-right" id="headerUte">Ute</div>
</div>

<button id="resetLayout">⟳</button>

<div class="container">
  <div class="column left" id="leftColumn"></div>
  <div class="column right" id="rightColumn">
    <div class="right-columns" id="rightColumns">
      <div class="right-subcolumn" id="rightCol1"></div>
      <div class="right-subcolumn" id="rightCol2"></div>
    </div>
    <div class="train-section" id="trainSection">
      <div class="train-header">Togtider</div>
      <div class="train-container">
        <div class="train-table" id="trainTable"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// 🔥 Firebase-konfig (sett inn din)
const firebaseConfig = {
  apiKey: "DIN_API_KEY",
  authDomain: "DITT_PROSJEKT.firebaseapp.com",
  databaseURL: "https://DITT_PROSJEKT.firebaseio.com",
  projectId: "DITT_PROSJEKT_ID",
  storageBucket: "DITT_PROSJEKT.appspot.com",
  messagingSenderId: "DIN_SENDER_ID",
  appId: "DIN_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const orderRef = db.ref("taxiOrder");

const group1=[34,40,164,174,169,190,280,2036,844,2613,2133];
const group2=[161,166,167,2065,2267,2488,2979,2980,2624,2988,2614];
const allNumbers=[...group1,...group2];

const leftColumn=document.getElementById('leftColumn');
const rightCol1=document.getElementById('rightCol1');
const rightCol2=document.getElementById('rightCol2');

// 🚀 1. Bygg alltid default lokalt først
console.log("⚡ Starter med default oppsett lokalt");
buildDefaultLayout();

// 📥 2. Koble til Firebase og oppdater ved endring
orderRef.on("value", snapshot => {
  console.log("🔄 Firebase-data:", snapshot.val());

  let saved = snapshot.val();
  if (!saved) {
    console.warn("⚠️ Database tom → Laster opp default");
    saved = {};
    allNumbers.forEach(num => {
      saved[num] = { side: "right", state: "number" };
    });
    orderRef.set(saved)
      .then(() => console.log("✅ Default lastet opp til Firebase"))
      .catch(err => console.error("❌ Feil ved opplasting til Firebase:", err));
  }
  rebuildFromData(saved);
});

// 🔹 Funksjon: bygg default layout lokalt
function buildDefaultLayout(){
  leftColumn.innerHTML=''; rightCol1.innerHTML=''; rightCol2.innerHTML='';
  group1.forEach(num => rightCol1.appendChild(createItem(num,'right')));
  group2.forEach(num => rightCol2.appendChild(createItem(num,'right')));
}

// 🔹 Funksjon: bygg UI fra Firebase-data
function rebuildFromData(saved){
  console.log("🔄 Oppdaterer UI med data fra Firebase");
  leftColumn.innerHTML=''; rightCol1.innerHTML=''; rightCol2.innerHTML='';
  allNumbers.forEach(num=>{
    let entry=saved[num];
    if(entry && entry.side==='left'){ leftColumn.appendChild(createItem(num,'left',entry.state)); }
    else{ if(group1.includes(num)) rightCol1.appendChild(createItem(num,'right')); else rightCol2.appendChild(createItem(num,'right')); }
  });
  sortRightColumns();
  updateNumbering();
}

function createItem(num,side,state='number'){
  const wrap=document.createElement('div'); wrap.className='item';
  const prefix=document.createElement('div'); prefix.className='prefix'; wrap.appendChild(prefix);
  const btn=document.createElement('button'); btn.className='button'; btn.dataset.value=num; btn.dataset.state=state;
  if(side==='left') addStateToggle(btn);
  updateButtonColor(btn,side);
  wrap.appendChild(btn);
  return wrap;
}
function addStateToggle(btn){
  btn.removeEventListener('click',btn.toggleHandler);
  btn.toggleHandler=()=>{
    if(btn.dataset.state==='number') btn.dataset.state='terminal';
    else if(btn.dataset.state==='terminal') btn.dataset.state='lading';
    else btn.dataset.state='number';
    updateButtonColor(btn,'left');
    saveOrder();
  };
  btn.addEventListener('click',btn.toggleHandler);
}
function updateButtonColor(btn,loc){
  btn.classList.remove('green','terminal','lading','blue');
  if(loc==='left'){
    let icon='';
    if(btn.dataset.state==='terminal'){ btn.classList.add('terminal'); icon='🚋'; }
    else if(btn.dataset.state==='lading'){ btn.classList.add('lading'); icon='🔋'; }
    else{ btn.classList.add('green'); icon='🚖'; }
    btn.innerHTML=`<span class="icon-slot">${icon}</span><span class="value-slot">${btn.dataset.value}</span><span class="arrow-slot">▶</span>`;
  } else {
    btn.classList.add('blue');
    btn.innerHTML=`<span class="arrow-left">◀</span><span style="flex:1; text-align:center;">${btn.dataset.value}</span>`;
  }
}
function updateNumbering(){
  [...leftColumn.querySelectorAll('.item')].forEach((it,i)=>{ it.querySelector('.prefix').textContent=String(i+1).padStart(2,' '); });
}
function saveOrder(){
  const o={};
  [...leftColumn.querySelectorAll('.button')].forEach(b=>{ o[b.dataset.value]={side:'left',state:b.dataset.state}; });
  [...rightCol1.querySelectorAll('.button'),...rightCol2.querySelectorAll('.button')].forEach(b=>{ o[b.dataset.value]={side:'right',state:'number'}; });
  console.log("📤 Lagrer til Firebase:", o);
  orderRef.set(o).catch(err => console.error("❌ Feil ved lagring:", err));
}
function sortRightColumns(){
  const items=[...rightCol1.querySelectorAll('.item'),...rightCol2.querySelectorAll('.item')];
  items.sort((a,b)=>Number(a.querySelector('button').dataset.value)-Number(b.querySelector('button').dataset.value));
  rightCol1.innerHTML=''; rightCol2.innerHTML='';
  items.forEach(it=>{ const n=Number(it.querySelector('button').dataset.value); if(group1.includes(n)) rightCol1.appendChild(it); else rightCol2.appendChild(it); });
}

new Sortable(rightCol1,{group:"numbers",animation:200,onAdd:onAddRight});
new Sortable(rightCol2,{group:"numbers",animation:200,onAdd:onAddRight});
new Sortable(leftColumn,{group:"numbers",animation:200,onAdd:onAddLeft,onUpdate:updateNumbering});

function onAddRight(evt){ evt.item.querySelector('.prefix').textContent=''; saveOrder(); }
function onAddLeft(evt){ addStateToggle(evt.item.querySelector('button')); saveOrder(); }
</script>
</body>
</html>
